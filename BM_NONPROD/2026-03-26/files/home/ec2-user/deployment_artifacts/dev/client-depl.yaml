apiVersion: v1
kind: Namespace
metadata:
  name: dev-product-catalogue
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-depl
  namespace: dev-product-catalogue
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
      annotations:
        version: "0.0.0-367"
    spec:
      containers:
        - name: client
          image: 396913725884.dkr.ecr.af-south-1.amazonaws.com/dev/product-catalogue/client:0.0.0-367
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: client-serv
  namespace: dev-product-catalogue
spec:
  selector:
    app: client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
