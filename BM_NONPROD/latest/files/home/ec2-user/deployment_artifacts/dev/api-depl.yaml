apiVersion: v1
kind: Namespace
metadata:
  name: dev-product-catalogue
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-depl
  namespace: dev-product-catalogue
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        version: "1.0.0-370"
    spec:
      containers:
        - name: api
          image: 396913725884.dkr.ecr.af-south-1.amazonaws.com/dev/product-catalogue/api:1.0.0-370
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: SERVICE_NAME
              value: api-service
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_ENV
              value: dev
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: URI
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: USER
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: PASS
            - name: MONGO_AUTHSOURCE
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: AUTH_SOURCE
            - name: ENABLE_NATS
              value: "true"
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NATS_URL
              value: "http://nats-srv:4222"
            - name: NATS_CLUSTER_ID
              value: product_catalogue
            - name: ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: ACCESS_KEY_ID
            - name: SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: SECRET_ACCESS_KEY
            - name: REGION
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: REGION
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: BUCKET
            - name: FOLDER
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: FOLDER
            # OAuth
            - name: ORIGIN
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: ORIGIN
            - name: AUTHORIZATION_URL
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: AUTHORIZATION_URL
            - name: LOGOUT_URL
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: LOGOUT_URL
            - name: TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: TOKEN_URL
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: CLIENT_ID
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: CLIENT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: api-serv
  namespace: dev-product-catalogue
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
