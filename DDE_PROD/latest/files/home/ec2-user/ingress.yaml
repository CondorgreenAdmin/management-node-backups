apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
spec:
  controller: k8s.io/ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
spec:
  ingressClassName: nginx
  rules:
  - host: "ddedev.vodacom.co.za"
    http:
      paths:
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: dde-serv
            port:
              number: 80
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: client-serv
            port:
              number: 80
